# npmjs counterpart of .forgejo/workflows/publish-npm-inthemoon.yml. Same single source of truth: the
# version in tools/server/package.json. Bump it, push main, and this publishes that version
# to npmjs — but ONLY when running on real GitHub (the `if` below), never on the Forgejo
# mirror that shares this file. Forgejo keeps publishing to Nexus; each side tags its own
# remote. Re-pushing main is idempotent: it publishes only when the version is not already on
# npmjs (the registry analog of publish-npm-inthemoon.yml's "does the v<version> tag exist?").
on:
  push:
    branches: [main]
    paths: ['tools/server/package.json']
  workflow_dispatch:

jobs:
  publish:
    # Real GitHub only. The Forgejo runner reports its own server_url, so this whole job is
    # skipped there — Nexus stays publish-npm-inthemoon.yml's job, npmjs stays this one's.
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release tag with the default GITHUB_TOKEN
      actions: write # dispatch desktop.yml for the tag we just pushed
      id-token: write # npm trusted publishing (OIDC) — no NPM_TOKEN; provenance is auto
    defaults:
      run:
        working-directory: tools/server
    steps:
      # No `token:` override. This used to pass secrets.RELEASE_PAT so that the tag it pushes
      # would re-trigger desktop.yml (a tag pushed by GITHUB_TOKEN is intentionally inert).
      # That secret was never created, and GitHub maps an absent secret to "", so checkout
      # failed outright — "Input required and not supplied: token" — leaving npmjs stuck at
      # 0.3.14. Drop the PAT; the last step dispatches desktop.yml instead, needing no secret.
      - uses: actions/checkout@v4
        with:
          submodules: true # conformance corpora, so the test gate runs in full
          fetch-depth: 0 # full tag history for the "already tagged?" check below

      # Node 24, not 22, purely for the npm it ships: trusted publishing (OIDC) needs npm
      # >= 11.5.1 and node 22 ships npm 10. We used to `npm install -g npm@latest` on top of
      # node 22, but upgrading npm in place over setup-node's toolcache leaves the install
      # incomplete — publish then died with "Cannot find module 'sigstore'", the very package
      # provenance needs. Node 24 ships npm 11.6+, so no self-upgrade, so nothing to corrupt.
      # (24 >= the engines floor of 22; the test gate below is happy on it.)
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Assert npm can do trusted publishing (fail loudly, not at the publish step)
        run: |
          V=$(npm --version)
          [ "$(printf '11.5.1\n%s\n' "$V" | sort -V | head -1)" = "11.5.1" ] \
            || { echo "npm $V < 11.5.1 — OIDC trusted publishing needs newer"; exit 1; }
          echo "npm $V — OK for OIDC"

      - name: Read version from package.json
        id: v
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Is this version already on npmjs?
        id: check
        run: |
          if npm view "yamlover@${{ steps.v.outputs.version }}" version >/dev/null 2>&1; then
            echo "yamlover@${{ steps.v.outputs.version }} already published — nothing to do"
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Test gate (nothing is published if this fails)
        if: steps.check.outputs.new == 'true'
        run: |
          cd "$GITHUB_WORKSPACE"
          npm ci   # root install covers every workspace (parser, engine, server)
          npm test
          npm --prefix tools/server test

      - name: Tag the release
        if: steps.check.outputs.new == 'true'
        # Before publish, in lockstep with package.json — same idea as
        # .forgejo/publish-npm-inthemoon.yml, which owned tagging on the Forgejo side.
        # Idempotent: if the tag somehow already exists, skip rather than fail.
        run: |
          cd "$GITHUB_WORKSPACE"
          TAG="v${{ steps.v.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists — skipping tag"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Publish to npmjs
        if: steps.check.outputs.new == 'true'
        # prepack (scripts/build.mjs) bundles dist/server.js from the checked-out engine+parser.
        # Auth is OIDC trusted publishing (id-token above) — no token; provenance is generated
        # automatically, which is why package.json carries a github.com `repository` field.
        run: npm publish --access public

      - name: Build the desktop installers for this tag
        if: steps.check.outputs.new == 'true'
        # The tag above was pushed with GITHUB_TOKEN, which deliberately fires no `push: tags`
        # workflow — that inertness is exactly what secrets.RELEASE_PAT existed to work around.
        # Dispatch desktop.yml explicitly instead: `--ref <tag>` makes github.ref the tag, so its
        # checkout and its "attach to the Release" step behave just like a real tag push.
        # Non-fatal: a failed installer build must not retract a published npm package.
        run: gh workflow run desktop.yml --ref "v${{ steps.v.outputs.version }}" || true
        env:
          GH_TOKEN: ${{ github.token }}
