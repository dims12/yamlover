# CI quality gate: the full test suite (parser + engine, incl. the conformance corpora
# from the submodules) and the server typecheck, on every push / PR. GitHub counterpart of
# .forgejo/workflows/ci.yml. Node 22 is required (native .ts type-stripping + the built-in
# node:sqlite the engine runs on).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Real GitHub only — skipped on the Forgejo mirror, which runs the .forgejo copy.
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true # the JSON/JSON5/YAML conformance corpora (tests skip them if absent)

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Tests (parser + engine)
        run: |
          npm ci --prefix tools/engine/ts   # engine deps (xxhash-wasm) the root test gate imports
          npm test

      - name: Typecheck (server)
        run: |
          npm ci --prefix tools/server
          npm run typecheck

      - name: Tests (server — vitest)
        run: npm --prefix tools/server test
