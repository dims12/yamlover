# Deploy the demo SITE (tools/demo) to design-vm: rsync the code into
# ~/Design/www/yamlover-demo and restart the user systemd service, which re-pulls the
# latest dimskraft/yamlover-demo image on startup. GitHub counterpart of
# .forgejo/workflows/publish-demo-web.yml. Separate from publish-server-docker-hub.yml
# (which builds + pushes that image) — here we only ship the orchestrator that launches it.
#
# REACHING design-vm: its public SSH (port 22) is locked to a single IP by the GCP VPC
# firewall, so a GitHub-hosted runner can't connect over the internet. Instead the runner
# joins the existing self-hosted WireGuard VPN (hub: sedna 140.82.50.142:51820) as an
# ephemeral peer 10.9.0.3 and SSHes to design-vm at its tunnel IP 10.9.0.2 — tunneled
# traffic arrives on wg0 and bypasses the public firewall. The hub already routes peer↔peer.
#
# No one-time bootstrap: every step below is idempotent, so a from-scratch host comes up on
# the first run. The deploy user (dims) has passwordless sudo, so the job seeds the env file,
# installs the user unit, enables linger, ensures /etc/caddy/conf.d is imported, installs the
# Caddy drop-in, and reloads — creating whatever is missing and leaving what already exists.
# Assumes only that system software (Node>=22, Docker with dims in the docker group, Caddy,
# the *.inthemoon.net cert) is present.
#
# Required GitHub secrets:
#   WG_CI_CONF           — full wireguard-tools config for the runner peer (10.9.0.3);
#                          its public key is registered on the sedna hub.
#   DESIGN_VM_DEPLOY_KEY — private key authorized for dims@design-vm (forgejo-deploy-design-vm).
# Optional (have sane defaults): DEPLOY_HOST (10.9.0.2, design-vm's WG IP), DEPLOY_USER (dims).
on:
  push:
    branches: [main]
    paths:
      - 'tools/demo/**'
      - '.github/workflows/publish-demo-web.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    # Real GitHub only — skipped on the Forgejo mirror, which runs the .forgejo copy.
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || '10.9.0.2' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'dims' }}
      DEST: Design/www/yamlover-demo
    steps:
      - uses: actions/checkout@v4

      - name: Join the WireGuard VPN (ephemeral peer 10.9.0.3 → reaches design-vm via sedna)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools >/dev/null
          umask 077
          printf '%s\n' "${{ secrets.WG_CI_CONF }}" | sudo tee /etc/wireguard/wgci.conf >/dev/null
          sudo wg-quick up wgci
          # confirm the tunnel handshook with the hub before relying on it
          sudo wg show wgci

      - name: Set up SSH key + known_hosts
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.DESIGN_VM_DEPLOY_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync tools/demo → design-vm
        run: |
          # --delete keeps the target an exact mirror of tools/demo; exclude the runtime
          # state (sqlite db / spool) and VCS cruft so a deploy never wipes live data.
          rsync -az --delete \
            --exclude '.data/' \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            -e "ssh -i ~/.ssh/id_deploy -o BatchMode=yes" \
            tools/demo/ "$DEPLOY_USER@$DEPLOY_HOST:$DEST/"

      - name: Install + (re)start the user service (idempotent — no prior bootstrap)
        run: |
          ssh -i ~/.ssh/id_deploy -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" bash -se <<'REMOTE'
          set -euo pipefail
          ME="$(id -un)"
          DEST="$HOME/Design/www/yamlover-demo"
          mkdir -p ~/.config/systemd/user "$DEST/.data"
          # env file lives OUTSIDE the deploy dir (rsync --delete never touches it). Seed it
          # from the example on first deploy, then leave it alone so secrets/edits survive.
          if [ ! -f ~/.config/yamlover-demo.env ]; then
            install -m 0600 "$DEST/deploy/yamlover-demo.env.example" ~/.config/yamlover-demo.env
          fi
          install -m 0644 "$DEST/deploy/yamlover-demo.service" \
            ~/.config/systemd/user/yamlover-demo.service
          # the unit sources the Resend key from root-only /etc/resend.env (EnvironmentFile=-,
          # so absent is fine). If present, make it group-readable so this user service can read
          # it (idempotent). Without it, email stays console / sends fail but the server runs.
          if [ -f /etc/resend.env ]; then
            sudo chown "root:$(id -gn)" /etc/resend.env
            sudo chmod 640 /etc/resend.env
          fi
          # linger lets the user service run with no active login + survive reboot (idempotent)
          sudo loginctl enable-linger "$ME"
          export XDG_RUNTIME_DIR="/run/user/$(id -u)"
          systemctl --user daemon-reload
          systemctl --user enable yamlover-demo
          systemctl --user restart yamlover-demo
          # give it a moment, then confirm it's serving locally
          for i in $(seq 1 20); do
            curl -fsS -o /dev/null "http://127.0.0.1:8080/" && break
            sleep 1
          done
          systemctl --user --no-pager --lines=5 status yamlover-demo | head -12
          REMOTE

      - name: Install + reload Caddy site config (idempotent — no prior bootstrap)
        run: |
          # The just-rsynced deploy/Caddyfile is the source of truth for the vhost. Ensure the
          # conf.d dir exists and that the main Caddyfile imports it, install our own whole-file
          # drop-in (never touches other sites' blocks), validate, then reload. validate runs
          # before reload, so a bad config fails the job without disrupting the running Caddy
          # (it keeps serving its last-good in-memory config).
          ssh -i ~/.ssh/id_deploy -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" bash -se <<'REMOTE'
          set -euo pipefail
          SRC="$HOME/Design/www/yamlover-demo/deploy/Caddyfile"
          MAIN=/etc/caddy/Caddyfile
          DROPIN=/etc/caddy/conf.d/yamlover.caddy
          sudo mkdir -p /etc/caddy/conf.d
          if ! sudo grep -qE '^[[:space:]]*import[[:space:]]+/etc/caddy/conf\.d/\*\.caddy' "$MAIN"; then
            printf '\nimport /etc/caddy/conf.d/*.caddy\n' | sudo tee -a "$MAIN" >/dev/null
          fi
          sudo install -m 0644 "$SRC" "$DROPIN"
          sudo caddy validate --config "$MAIN" --adapter caddyfile
          sudo systemctl reload caddy
          echo "caddy reloaded with $DROPIN"
          REMOTE

      - name: Leave the WireGuard VPN
        if: always() # tear the tunnel down even if the deploy failed
        run: sudo wg-quick down wgci || true
