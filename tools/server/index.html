<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>yamlover</title>
    <!-- Stamp the theme BEFORE first paint (no wrong-palette flash on reload). Reads the raw
         mirror of the resolved theme (browser-settings.ts applyTheme keeps it fresh); the
         yamlover settings document itself is the source of truth, parsed by the app bundle.
         No mirror yet (first visit, blocked storage) ⇒ light, the default theme — the bare
         stylesheet :root is the dark palette, so the stamp must not be skipped. -->
    <script>
      var t = "light";
      try { t = localStorage.getItem("yamlover.theme") || t; } catch (e) {}
      document.documentElement.dataset.theme = t;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
