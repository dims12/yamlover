# A small documentation tree that is **about its own links** — subchapters nested
# a few levels deep, each demonstrating one flavour of marklower link. Links live
# in the app's JSON instance space, with three forms (mirroring how an `x-yamlover`
# rel pointer is written):
#
#   - `[text](/path)`   — **document-relative**: from the root of *this* document
#     (the nearest yamlover entity — here the whole guide), no matter how deeply
#     nested the chunk is. Resolved against the server-reported `documentPath`.
#   - `[text](//path)`  — **project-root-relative**: from the served root (the
#     directory passed at yamlover startup), so it can point at sibling examples.
#   - `[text](https://…)` / `mailto:` — an ordinary **external** link.
#
# Every `/…` and `//…` link below points at a node that really exists, so they all
# navigate. The `chapter` shape is the usual recursive `$defs/chapter`; its `chunks`
# base is a bare `string` (no `format:`), i.e. marklower.
x-yamlover:
  concrete: yamlover
$ref: '#/$defs/chapter'
title: A Tour of marklower Links
description: Document-relative, project-root, and external links — by example
properties:
  chunks:
    prefixItems:
      - const: >-
          marklower links are written in **JSON instance space**, and come in three
          flavours. Jump to the document-relative links subchapter at
          [/children[0]](/children[0]), the project-root one at
          [/children[1]](/children[1]), or external links at
          [/children[2]](/children[2]) — each its own subchapter below.
      - const: >-
          Wherever you are in this guide, the top of it at [/chunks[0]](/chunks[0])
          is one document-relative link away. You can also leave for the wider world,
          like the KaTeX project at [https://katex.org](https://katex.org).
  children:
    prefixItems:
      - title: Document-relative links
        description: A single leading slash — relative to this document
        properties:
          chunks:
            prefixItems:
              - const: >-
                  A `/path` link is relative to **this document** — the whole guide —
                  however deep you are reading. So the link
                  [/chunks[0]](/chunks[0]) always lands on the guide's opening line.
              - const: >-
                  From here you can reach a sibling section at
                  [/children[1]](/children[1]), or descend one level deeper to
                  [/children[0]/children[0]](/children[0]/children[0]).
          children:
            prefixItems:
              - title: Going deeper
                description: Document-relative paths don't care how nested you are
                properties:
                  chunks:
                    prefixItems:
                      - const: >-
                          Even two levels down, a `/…` link still counts from the
                          document root: here is the guide's intro at
                          [/chunks[0]](/chunks[0]) again, and the external-links
                          section at [/children[2]](/children[2]).

      - title: Project-root links
        description: Two leading slashes — relative to the served root
        properties:
          chunks:
            prefixItems:
              - const: >-
                  A `//path` link is relative to the **project root** — the directory
                  you served. Served from the repo, the examples live under
                  `examples/`, so a sibling example is reached at
                  [//examples/19-math-chapter](//examples/19-math-chapter), or one
                  formula in it at
                  [//examples/19-math-chapter/chunks[2]](//examples/19-math-chapter/chunks[2]).
              - const: >-
                  Because `//` counts from the served root, the exact prefix depends
                  on where you launched yamlover. The pet handbook is at
                  [//examples/17-doc-tree](//examples/17-doc-tree). To return home —
                  regardless of mount point — use a document-relative link to this
                  guide's intro at [/chunks[0]](/chunks[0]).

      - title: External links
        description: A URI scheme — an ordinary outbound link
        properties:
          chunks:
            prefixItems:
              - const: >-
                  Any target with a scheme is an external link, opened in a new tab:
                  Wikipedia on hyperlinks at
                  [https://en.wikipedia.org/wiki/Hyperlink](https://en.wikipedia.org/wiki/Hyperlink),
                  the KaTeX support tables at
                  [https://katex.org/docs/supported.html](https://katex.org/docs/supported.html),
                  or email the maintainer at
                  [mailto:dimskraft@gmail.com](mailto:dimskraft@gmail.com).

$defs:
  chapter:
    type: object
    format: x-yamlover-chapter
    properties:
      chunks:                              # the body, read as numbered marklower blocks
        type: array
        items:
          type: string                     # no `format:` → marklower (links live here)
      children:                            # the subchapters — the recursion
        type: array
        items:
          $ref: '#/$defs/chapter'
