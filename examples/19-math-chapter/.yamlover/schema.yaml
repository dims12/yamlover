# A small chapter that mixes **two ways of showing math**: inline formulas written
# in *marklower* prose, and whole standalone math chunks.
#
#   - marklower is the default chunk format — a bare `string` with no `format`. The
#     chunks' `items` base here declares only `type: string` (no `format:`), so a
#     plain `const:` routes to the marklower renderer, which typesets any `$$…$$`
#     span inline with KaTeX and passes the rest of the text through.
#   - a chunk that overrides `format: text/x-latex` is a *whole* formula: the LaTeX
#     renderer typesets the entire string as one display block. marklower reuses the
#     very same KaTeX engine for its inline spans, so the two read consistently.
#
# The `chapter` shape is the usual `$defs/chapter` (object + `x-yamlover-chapter`),
# here carrying only `chunks` — no subchapters.
x-yamlover:
  concrete: yamlover
$ref: '#/$defs/chapter'
title: A Pinch of Math
description: Inline marklower math and standalone LaTeX chunks, side by side
properties:
  chunks:
    prefixItems:
      - const: >-
          Mathematics likes to hide **big ideas** in *short symbols*. The most famous
          of all, Euler's identity $$e^{i\pi} + 1 = 0$$, ties together five constants
          in a single breath — note how the $$e^{i\pi}$$ above sits *inside* this
          sentence, and marklower also styles `inline code`, __bold__, and
          ~~struck-out~~ text.
      - const: >-
          When a formula deserves a line of its own, give it a whole chunk — see the
          Gaussian integral below at [/chunks[2]](/chunks[2]), a standalone LaTeX
          block. (That link is relative to *this document*, like an absolute rel
          pointer.)
      - format: text/x-latex                 # a whole standalone formula → the LaTeX renderer
        const: \int_{-\infty}^{\infty} e^{-x^2}\,dx = \sqrt{\pi}
      - const: >-
          Inline math also handles the everyday: the area of a circle is
          $$A = \pi r^2$$ and the quadratic formula $$x = \frac{-b \pm \sqrt{b^2 - 4ac}}{2a}$$
          both flow right through the prose.
      - format: text/x-latex                 # another standalone block — a summation
        const: \sum_{k=1}^{n} k = \frac{n(n+1)}{2}

$defs:
  chapter:
    type: object
    format: x-yamlover-chapter
    properties:
      chunks:                                # the body, read as numbered blocks
        type: array
        items:
          type: string                       # no `format:` → the marklower default; a
                                             # chunk overrides it to text/x-latex for a
                                             # whole standalone formula
      children:                              # subchapters (unused here) — the recursion
        type: array
        items:
          $ref: '#/$defs/chapter'
