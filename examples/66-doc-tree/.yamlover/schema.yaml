# A recursive document tree (a help/book structure) that mixes media. Every prose
# chunk is pinned inline with `const`, but a chapter's `chunks` array is *not*
# prose-only: each chunk routes by its own (type, format), so the same numbered
# body can interleave Markdown, PlantUML diagrams (`text/x-plantuml`), and image
# files (`image/png`). A `chapter` is an object with two arrays: `chunks` (the
# body, read as numbered blocks) and `children` (its subchapters — the recursion).
# Crucially the two are *separate*: a chapter is heading + body + subchapters, and
# subchapters are terminal — there is no returning to the parent's prose after one,
# the way real documents read. `title`/`description` are JSON-Schema annotations
# carrying each chapter's heading and subtitle. The `chapter` $def carries
# `format: x-yamlover-chapter`, which the server's renderer registry keys on to
# present a chapter as a readable page; the chapter then delegates each chunk to
# the renderer for *that chunk's* (type, format) — the text renderer for Markdown,
# the PlantUML renderer for a diagram, the image renderer for a PNG. The chunks'
# `items` base declares `string`/`text/markdown`, so a plain `const:` string is
# prose; a chunk overrides `format`/`type` only when it is a diagram or an image.
x-yamlover:
  concrete: yamlover
$ref: '#/$defs/chapter'
title: The Pet Keeper's Handbook
description: A friendly guide to living with animals
properties:
  chunks:
    prefixItems:
      - const: "**Pets share our homes, our routines, and a surprising amount of our furniture.** This handbook collects what every keeper learns sooner or later, one species at a time."
      - const: "Read the chapter for your companion, but the first rule is universal: *watch, listen, and be patient.*"
      - type: binary                       # an image chunk — overrides the markdown base
        format: image/png
        description: A friendly paw print
        x-yamlover:
          concrete: file/binary
          os:
            path: cover-paw.png
      - const: "Three needs run through every chapter — **company, exercise, and a clean environment** — weighted differently for each animal:"
      - format: text/x-plantuml            # a diagram chunk — a mind-map of the book
        const: |
          @startmindmap
          * Pet keeping
          ** Dogs
          *** Daily walks
          *** Consistent training
          ** Cats
          *** Vertical space
          *** A clean litter box
          ** Fish
          *** Water quality
          *** Sparing feeding
          @endmindmap
  children:
    prefixItems:
      - title: Dogs
        description: Loyal, loud, and endlessly hopeful
        properties:
          chunks:
            prefixItems:
              - const: "A dog is a **social animal** that adopts your family as its pack."
              - type: binary
                format: image/png
                description: A dog's bone
                x-yamlover:
                  concrete: file/binary
                  os:
                    path: dog-bone.png
              - const: "Daily walks are not optional; they are how a dog reads the news of the neighbourhood. Consistency matters more than severity — the same word should always mean the same thing."
              - const: "A walk is a small ritual you both know by heart:"
              - format: text/x-plantuml      # the daily-walk ritual as a sequence
                const: |
                  @startuml
                  actor Keeper
                  participant Dog
                  Keeper -> Dog : pick up the lead
                  Dog --> Keeper : spins with delight
                  Keeper -> Dog : walk the usual route
                  Dog -> Dog : reads the news (sniffs)
                  Dog --> Keeper : returns home calm
                  @enduml
          children:
            prefixItems:
              - title: Puppies
                description: The first few months
                properties:
                  chunks:
                    prefixItems:
                      - const: "Puppies sleep most of the day and chew most of the rest."
                      - type: binary
                        format: image/png
                        description: A puppy's paw print
                        x-yamlover:
                          concrete: file/binary
                          os:
                            path: puppy-paw.png
                      - const: "Begin house training the day they arrive, reward every success generously, and give early, gentle exposure to people and places — it shapes a calm adult dog."
                      - const: "The first months follow a rough schedule:"
                      - format: text/x-plantuml    # the first-months plan as a Gantt
                        const: |
                          @startgantt
                          Project starts 2026-01-01
                          [Settle in] lasts 3 days
                          [House training] lasts 28 days
                          [House training] starts at [Settle in]'s end
                          [Socialisation] lasts 60 days
                          [Socialisation] starts at [Settle in]'s end
                          @endgantt

      - title: Cats
        description: Independent roommates with opinions
        properties:
          chunks:
            prefixItems:
              - const: "A cat tolerates your presence on terms it renews daily."
              - type: binary
                format: image/png
                description: A cat's face
                x-yamlover:
                  concrete: file/binary
                  os:
                    path: cat-face.png
              - const: "Vertical space — shelves, perches, a tall scratching post — keeps a cat content. And a clean litter box is the single most important thing you can offer a cat."
              - const: "A cat's day cycles through a few well-known states:"
              - format: text/x-plantuml      # a cat's daily mood as a state machine
                const: |
                  @startuml
                  [*] --> Aloof
                  Aloof --> Hungry : dinnertime
                  Hungry --> Affectionate : fed
                  Affectionate --> Aloof : had enough
                  Aloof --> Zoomies : 3 a.m.
                  Zoomies --> Aloof : worn out
                  @enduml

      - title: Fish
        description: A quiet window into another world
        properties:
          chunks:
            prefixItems:
              - const: "An aquarium is a small ecosystem, and **water quality is everything.**"
              - type: binary
                format: image/png
                description: A fish in its tank
                x-yamlover:
                  concrete: file/binary
                  os:
                    path: fish-tank.png
              - const: "Cycle a new tank for weeks before adding fish, so helpful bacteria can establish. Feed sparingly: uneaten food fouls the water faster than anything else."
              - const: "The bacteria you are waiting for run the **nitrogen cycle**, turning toxic waste into something far milder:"
              - format: text/x-plantuml      # the nitrogen cycle
                const: |
                  @startuml
                  [*] --> Ammonia : fish waste
                  Ammonia --> Nitrite : Nitrosomonas
                  Nitrite --> Nitrate : Nitrobacter
                  Nitrate --> [*] : water change
                  @enduml

$defs:
  chapter:
    type: object
    format: x-yamlover-chapter
    properties:
      chunks:                              # the body, read as numbered blocks
        type: array
        items:
          type: string
          format: text/markdown            # the base chunk (type, format) — a chunk
                                           # overrides it to be a diagram or an image
      children:                            # the subchapters — the recursion
        type: array
        items:
          $ref: '#/$defs/chapter'
