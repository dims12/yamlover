# ============================================================================
# 05 — YAML.  YAML ⊂ yamlover.  Same data as the json trio, as a plain YAML file.
# This is the "file" instance concrete: one text file holds the whole instance.
#
# YAML already has anchors (&) and aliases (*) for INTRA-document sharing — a real
# reference, not a copy. But that is YAML's ceiling: no path pointers, no scopes/
# links, no ~ back-edges. Those are yamlover's additions (see 06-tour.yamlover).
# ============================================================================
pets:
  - name: Rex
    species: dog
  - &whiskers          # anchor: name this node so it can be reused
    name: Whiskers
    species: cat
  - name: Bubbles
    species: fish

humans:
  - name: Alice
    manager: *whiskers # YAML alias: the SAME node as pets[1], shared by anchor name
                       # (YAML can share by &/* name, but cannot say "*/pets[1]" by path)
