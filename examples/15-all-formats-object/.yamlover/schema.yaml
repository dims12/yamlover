# A single object with **one property per renderable `(type, format)`** the web
# viewer supports — a catalogue of every renderer, side by side. Three properties
# are *string* formats pinned inline with `const` (markdown / asciidoc / plantuml);
# the rest are *binary* files in this directory (`concrete: file/binary` +
# `os.path`), each tagged with the MIME `format` that keys its renderer. Navigating
# into any property shows that node in its own renderer (the `(type, format)` tuple
# selects it), so this entity doubles as a smoke test for the whole registry. Its
# sibling [16-all-formats-chunks] puts the same set into a chapter's `chunks`.
x-yamlover:
  concrete: yamlover
title: All Supported Formats — as object properties
description: One property per renderable (type, format) the viewer knows how to show
properties:
  markdown:                              # string / text/markdown — pinned inline
    type: string
    format: text/markdown
    const: |
      # Markdown
      Rendered with **marked** — *emphasis*, lists, and `code`. Each heading gets a
      `§` link, so `#markdown` and `#anchors` jump straight to a section.

      ## Anchors
      Hover a heading to reveal its `§`; the URL fragment is the heading's slug.
  asciidoc:                              # string / text/asciidoc
    type: string
    format: text/asciidoc
    const: |
      == AsciiDoc

      Rendered with Asciidoctor.

      * one
      * two

      === Anchors

      Each heading gets a `§` link; Asciidoctor's own section id is the fragment.
  plantuml:                              # string / text/x-plantuml
    type: string
    format: text/x-plantuml
    const: |
      @startuml
      Alice -> Bob : hello
      Bob --> Alice : hi
      @enduml
  csv:                                   # string / text/csv — shown as a table
    type: string
    format: text/csv
    const: |
      name,role,city
      Alice,Engineer,Berlin
      Bob,"Designer, UX",Lisbon
      Carol,Manager,Oslo
  png:                                   # binary files below — each claims a file in this dir
    type: binary
    format: image/png
    x-yamlover: { concrete: file/binary, os: { path: sample.png } }
  svg:
    type: binary
    format: image/svg+xml
    x-yamlover: { concrete: file/binary, os: { path: sample.svg } }
  gif:
    type: binary
    format: image/gif
    x-yamlover: { concrete: file/binary, os: { path: sample.gif } }
  bmp:
    type: binary
    format: image/bmp
    x-yamlover: { concrete: file/binary, os: { path: sample.bmp } }
  ico:
    type: binary
    format: image/x-icon
    x-yamlover: { concrete: file/binary, os: { path: sample.ico } }
  tiff:
    type: binary
    format: image/tiff
    x-yamlover: { concrete: file/binary, os: { path: sample.tiff } }
  html:
    type: binary
    format: text/html
    x-yamlover: { concrete: file/binary, os: { path: sample.html } }
  pdf:
    type: binary
    format: application/pdf
    x-yamlover: { concrete: file/binary, os: { path: sample.pdf } }
  fb2:
    type: binary
    format: application/x-fictionbook+xml
    x-yamlover: { concrete: file/binary, os: { path: sample.fb2 } }
  epub:
    type: binary
    format: application/epub+zip
    x-yamlover: { concrete: file/binary, os: { path: sample.epub } }
  psd:
    type: binary
    format: image/vnd.adobe.photoshop
    x-yamlover: { concrete: file/binary, os: { path: sample.psd } }
