x-yamlover:
  concrete: yamlover
properties:
  $defs:
    description: Defines a set of reusable templates
    x-yamlover:
      concrete: dir
      os:
        path: defs
  examples:
    description: Contains example configurations for Yamlover
    x-yamlover:
      concrete: dir
    properties:
      01-object-in-schema:
        description: >-
          A yamlover node whose whole mapping is pinned inside the schema with
          const — the schema counterpart of 04-object-in-dir/02-object-in-yaml; no data file
          exists, the values live in the schema itself.
        x-yamlover:
          concrete: yamlover

      02-object-in-yaml:
        description: >-
          A yamlover node whose whole mapping is collapsed into a single YAML
          file (somefile.yaml); the object counterpart of 08-scalar-file-overlay.
        x-yamlover:
          concrete: yamlover
      03-object-in-json:
        description: >-
          The JSON-file twin of 02-object-in-yaml — the same mapping collapsed into a
          single JSON file (somefile.json, concrete file/json); its keys live in
          the json interior concrete.
        x-yamlover:
          concrete: yamlover
      04-object-in-dir:
        description: >-
          A yamlover node whose scalar children (name, age, isAdmin) are each
          stored in their own YAML-text file (concrete file/yaml).
        x-yamlover:
          concrete: yamlover
      05-scalar-as-file:
        description: >-
          The file representation — a plain text file whose content (30) is
          valid YAML.
        x-yamlover:
          concrete: file/yaml
      06-plain-dir:
        description: >-
          The dir representation — a plain directory with no .yamlover; the
          child age is a file holding 30.
        x-yamlover:
          concrete: dir
      07-scalar-in-schema:
        description: >-
          The yamlover representation — a directory whose schema pins the only
          valid value to 30 with const.
        x-yamlover:
          concrete: yamlover
      08-scalar-file-overlay:
        description: >-
          A yamlover overlay over an existing YAML file — a scalar integer
          stored in somefile.yaml, named via x-yamlover.os.path.
        x-yamlover:
          concrete: yamlover
      09-scalar-as-binary:
        description: >-
          A yamlover node with a scalar child (age) stored as a little-endian
          int32 binary file (concrete file/binary, format int32/le).
        x-yamlover:
          concrete: yamlover
      10-array-of-files:
        description: >-
          An array (sequence) encoded as a yamlover node — each element in its
          own file, ordered by prefixItems and named via x-yamlover.os.path,
          with per-element concrete encodings (file/yaml and file/json).
        x-yamlover:
          concrete: yamlover
      11-switch-schema-file-yaml:
        description: >-
          Continues the model with a different concrete from the middle: a
          mostly schema-pinned tree where one node (user.contact) switches to
          file/yaml, its data continuing in continuation.yaml.
        x-yamlover:
          concrete: yamlover
      12-image-with-markup:
        description: >-
          A yamlover node mixing a binary file child (object_detection.png,
          file/binary, image/png) with a markup array pinned inline in the
          schema with const.
        x-yamlover:
          concrete: yamlover
      13-defs-and-refs:
        description: >-
          Like 12-image-with-markup, but each markup region is included by a
          $ref to a $defs/rectangular-area shape, with the const coordinates
          inlined — $defs and $ref resolved in schema coordinates.
        x-yamlover:
          concrete: yamlover
      14-genealogy-dag:
        description: >-
          A small genealogy: the containment tree is the paternal line, and each
          person names a second parent (mother) via x-yamlover.rel and ^ up-edges.
          Females are leaves (dict children are paternal), so it is a DAG — e.g.
          azura is both adam's child and enoch's mother. Mothers regain children
          via .-prefixed virtual down-edges, listed/navigable but not nested.
        x-yamlover:
          concrete: yamlover
      15-doc-tree:
        description: >-
          A recursive document tree (a help/book): a chapter is an ordered list
          whose elements are prose strings or nested chapters, defined once in
          $defs and recursed via $ref. Fully self-contained — every block is
          pinned inline with const, so no .md files exist; title/description
          carry each chapter's heading and subtitle.
        x-yamlover:
          concrete: yamlover
